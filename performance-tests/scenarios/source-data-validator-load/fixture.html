<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Source data validator — load</title>
  <link rel="stylesheet" href="../../fixtures/handsontable.css">
  <script src="../../fixtures/handsontable.full.js"></script>
</head>
<body>
  <div id="hot"></div>
  <script>
    const el = document.getElementById('hot');
    // Data generated once, outside the traced build, so only grid construction is measured.
    const data = Handsontable.helper.createSpreadsheetData(10000, 50);

    // A custom `sourceDataValidator` (the public option) exercises source-data validation directly,
    // without depending on a built-in cell type's internals. A simple presence check runs per cell.
    function sourceDataValidator(value) {
      return value !== null && value !== undefined && value !== '';
    }

    window.__build = function () {
      if (window.__hot) {
        window.__hot.destroy();
        window.__hot = null;
      }

      window.__hot = new Handsontable(el, {
        data,
        sourceDataValidator,
        rowHeaders: true,
        colHeaders: true,
        width: 1280,
        height: 600,
        autoRowSize: false,
        autoColumnSize: false,
        licenseKey: 'non-commercial-and-evaluation',
      });
    };
  </script>
</body>
</html>
