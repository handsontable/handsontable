<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="handsontable/dist/handsontable.full.css">
  <script src="handsontable/dist/handsontable.full.js"></script>
</head>
<body>
  <div id="hot"></div>
  <script>
    const container = document.getElementById('hot');
    const hot = new Handsontable(container, {
      data: Handsontable.helper.createSpreadsheetData(5, 5),
      colHeaders: true,
      rowHeaders: true,
    });

    console.log('Initial setup complete');

    // Manually create a multi-range selection
    hot.selectCell(0, 0);
    console.log('After first select:', hot.getSelectedRange());

    // Simulate the second selection with meta key
    setTimeout(() => {
      const selection = hot.selection;
      selection.setExpectedLayers(2);
      selection.setRangeStartOnly(hot.toVisualCoords(2, 2), false);
      selection.setRangeEnd(hot.toVisualCoords(2, 2));
      selection.finish();
      
      console.log('After multi-select:', hot.getSelectedRange());
      console.log('Length:', hot.getSelectedRange().length);

      // Now test export/import
      const state = selection.exportSelection();
      console.log('Exported state:', JSON.stringify({
        rangesCount: state.ranges.length,
        activeSelectionLayer: state.activeSelectionLayer,
      }));

      // Update settings
      hot.updateSettings({ contextMenu: true });
      console.log('After updateSettings:', hot.getSelectedRange());

      // Import selection
      selection.importSelection(state);
      hot.render();

      console.log('After importSelection:', hot.getSelectedRange());
      console.log('Length after import:', hot.getSelectedRange()?.length);
    }, 100);
  </script>
</body>
</html>
