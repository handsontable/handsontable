name: Docs Staging Deployment

on:
  # Build PR previews on the pull_request event. The PR number comes from the
  # event payload, so the preview always knows which PR to comment on - unlike
  # the old push-driven build, which raced PR creation and often resolved no PR
  # (no preview comment, no Cloudflare deploy). The paths filter limits PR
  # builds to pull requests that change documentation files.
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
      - 'docs/**'
      - 'handsontable/package.json'
  # Push builds cover the non-PR contexts only: develop (apex staging) and
  # release/* (RC staging, triggered by the handsontable/package.json version
  # bump). Other branches get their preview from the pull_request event above,
  # so they are intentionally not built on push (avoids a duplicate build).
  push:
    branches:
      - develop
      - 'release/**'
    paths:
      - 'docs/**'
      - 'handsontable/package.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./docs/

jobs:
  preview:
    name: Build and push Preview to Netlify
    # Release branches build their production-mode RC staging from the push
    # trigger above, and that push build also resolves and comments on the open
    # release PR (its head is the release branch). Skip the pull_request build
    # for release-head PRs so they are not also built in dev mode on a separate
    # concurrency key, which would deploy twice and post a duplicate comment.
    # The prefix match is intentionally broader than the release/x.y.z version
    # pattern; any release/* head PR defers to its push build.
    if: ${{ !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/')) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Detect release branch
        id: release-info
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8.0.0
        with:
          script: |
            const ref = context.ref || '';
            // Match release/x.y.z branches (RC builds)
            const releaseMatch = ref.match(/^refs\/heads\/release\/(\d+\.\d+\.\d+)$/);
            const isReleaseBranch = !!releaseMatch;
            const targetVersion = releaseMatch ? releaseMatch[1] : '';

            core.setOutput('is_release', String(isReleaseBranch));
            core.setOutput('target_version', targetVersion);

            if (isReleaseBranch) {
              console.log(`Release branch detected: ${ref}`);
              console.log(`Target version: ${targetVersion}`);
              console.log('Will build docs in production mode (GTM/HotJar, no dev badge).');
            }

      - name: Find PR
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # https://github.com/jwalton/gh-find-current-pr/releases/tag/v1.3.5
        id: pr-finder

      - name: Resolve PR number
        id: resolve-pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8.0.0
        with:
          script: |
            // For pull_request events the number is in the event payload directly.
            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.eventName === 'push') {
              // For push events, look up the PR by head branch name.
              // This is more reliable than the commit-SHA lookup used by gh-find-current-pr,
              // which can miss brand-new PRs due to GitHub API eventual consistency.
              const branchName = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branchName}`,
                state: 'open'
              });
              if (prs.length > 0) {
                prNumber = prs[0].number;
                console.log(`Found PR #${prNumber} for branch ${branchName}`);
              }
            }

            // Fall back to the gh-find-current-pr output if the above did not resolve a number.
            if (!prNumber) {
              const fallback = '${{ steps.pr-finder.outputs.pr }}';
              prNumber = fallback ? Number(fallback) : undefined;
            }

            core.setOutput('number', prNumber ? String(prNumber) : '');

      - name: Get PR details
        id: get-pr
        if: ${{ steps.resolve-pr.outputs.number }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8.0.0
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ steps.resolve-pr.outputs.number }}')
            });

            console.log(`PR #${{ steps.resolve-pr.outputs.number }} details fetched`);
            console.log(`Source branch: ${pullRequest.head.ref}`);
            console.log(`Target branch: ${pullRequest.base.ref}`);

            // Set outputs to use in subsequent steps
            core.setOutput('source_branch', pullRequest.head.ref);
            core.setOutput('target_branch', pullRequest.base.ref);
            core.setOutput('pr_owner', pullRequest.head.repo.owner.login);
            core.setOutput('pr_repo', pullRequest.head.repo.name);

            return pullRequest;
          result-encoding: string

      - name: Install Netlify dependencies
        run: |
           cd netlify
           npm i
           npm install netlify-cli -g

      - name: Run the create or get Netlify Page process. Save the Netlify vars in a file
        run: |
          cd netlify
          node createOrGet.mjs
          cat NETLIFY_VARS >> $GITHUB_ENV
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PREVIEW_AUTH_TOKEN }}
          NETLIFY_ACCOUNT_SLUG: ${{ secrets.NETLIFY_ACCOUNT_SLUG }}
          BRANCH_NAME_PREFIX: ${{ steps.release-info.outputs.is_release == 'true' && 'rc-handsontable-' || 'dev-handsontable-' }}
          BRANCH_NAME: ${{ steps.release-info.outputs.is_release == 'true' && steps.release-info.outputs.target_version || github.head_ref || steps.get-pr.outputs.source_branch || github.ref_name }}

      - name: Publish sticky comment in PR. Docs are being built
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
        if: ${{ steps.resolve-pr.outputs.number }}
        with:
          number: ${{ steps.resolve-pr.outputs.number }}
          message: |
            🏗️ Preview documentation is being built/rebuilt.
            Current staging version of documentation will be available at: [${{ env.NETLIFY_SITE_URL }}/docs](${{ env.NETLIFY_SITE_URL }}/docs)

      - name: Install the monorepo dependencies (including docs) and build the packages
        working-directory: .
        run: |
          pnpm install
          npm run all build -- --e examples visual-tests

      # RC release branches: measure module sizes (same as production workflow).
      - name: Update module size measurements
        id: measure-module-sizes
        if: ${{ steps.release-info.outputs.is_release == 'true' }}
        continue-on-error: true
        working-directory: .
        run: |
          npm run measure:module-sizes --prefix handsontable

      - name: Build docs (for staging preview)
        id: build-docs
        run: |
          npm run build
        env:
          # RC release branches build in production mode to mimic the final
          # production deployment (GTM/HotJar injected, dev badge hidden).
          BUILD_MODE: ${{ steps.release-info.outputs.is_release == 'true' && 'production' || '' }}
          PUBLIC_CHAT_API_URL: ${{ secrets.PUBLIC_CHAT_API_URL }}

      - name: Build and deploy the preview to Netlify
        run: |
          cd netlify
          mkdir -p deploy/docs

          cp -r ../dist/. deploy/docs/

          # Place 404.html at the publish root so Netlify serves it
          # automatically for all unmatched routes (no redirect rule needed).
          cp ../dist/404.html deploy/404.html

          cp _dev_headers deploy/_headers
          cp _redirects deploy/_redirects

      - name: Publish preview to Netlify
        id: netlify-publish
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # https://github.com/nick-fields/retry/releases/tag/v3.0.2
        with:
          timeout_seconds: 1600
          max_attempts: 3
          retry_on: error
          command: |
            cd docs/netlify
            netlify deploy --prod --dir deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PREVIEW_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ env.NETLIFY_SITE_ID }}

      - name: Publish sticky comment in PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
        if: ${{ steps.resolve-pr.outputs.number }}
        with:
          number: ${{ steps.resolve-pr.outputs.number }}
          message: |
            ✅ Preview documentation is available now
            Current staging version of documentation is available at: [${{ env.NETLIFY_SITE_URL }}/docs](${{ env.NETLIFY_SITE_URL }}/docs)

      # Decide how this build maps to a Cloudflare Pages deployment:
      #   - push/dispatch on develop -> deploy to the production branch
      #     ("develop"), which Cloudflare serves at the apex
      #     handsontable-docs-staging.pages.dev.
      #   - a PR build -> deploy to branch "pr-<N>", served as an isolated
      #     preview at pr-<N>.handsontable-docs-staging.pages.dev.
      # Any deploy whose branch differs from the project's production_branch
      # is a preview, so the branch passed here determines apex vs preview.
      # Cloudflare Pages deploy is independent of Netlify: !cancelled() lets
      # these steps run even when the Netlify publish above fails, so the apex
      # handsontable-docs-staging.pages.dev still updates.
      - name: Determine Cloudflare Pages target
        id: cf-target
        if: ${{ !cancelled() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8.0.0
        with:
          script: |
            const prNumber = '${{ steps.resolve-pr.outputs.number }}';
            const ref = context.ref || '';

            if (ref === 'refs/heads/develop') {
              core.setOutput('deploy', 'true');
              core.setOutput('branch', 'develop');
              core.setOutput('is_production', 'true');
            } else if (prNumber) {
              core.setOutput('deploy', 'true');
              core.setOutput('branch', `pr-${prNumber}`);
              core.setOutput('is_production', 'false');
            } else {
              core.setOutput('deploy', 'false');
            }

      - name: Add Cloudflare worker to deploy
        if: ${{ !cancelled() && steps.cf-target.outputs.deploy == 'true' }}
        continue-on-error: true
        run: cp cloudflare/_worker.js netlify/deploy/_worker.js

      - name: Ensure Cloudflare Pages project exists
        if: ${{ !cancelled() && steps.cf-target.outputs.deploy == 'true' }}
        continue-on-error: true
        run: node cloudflare/ensureProject.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: handsontable-docs-staging
          # Develop builds deploy to --branch develop below, so the apex
          # handsontable-docs-staging.pages.dev tracks the develop branch.
          # (Here the label happens to match a real, long-lived git branch.)
          CF_PAGES_APEX_BRANCH: develop

      - name: Deploy to Cloudflare Pages
        id: cf-pages-deploy
        if: ${{ !cancelled() && steps.cf-target.outputs.deploy == 'true' }}
        continue-on-error: true
        # Install wrangler in /tmp to avoid npm failures inside the pnpm workspace
        working-directory: /tmp
        run: |
          npm install wrangler
          ./node_modules/.bin/wrangler pages deploy \
            "$GITHUB_WORKSPACE/docs/netlify/deploy" \
            --project-name handsontable-docs-staging \
            --branch "${{ steps.cf-target.outputs.branch }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update sticky PR comment with Cloudflare Pages URL
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
        if: ${{ !cancelled() && steps.resolve-pr.outputs.number && steps.cf-pages-deploy.outcome == 'success' }}
        with:
          number: ${{ steps.resolve-pr.outputs.number }}
          # The Netlify row is only included when the Netlify publish actually
          # succeeded -- this comment can now run after a failed Netlify publish
          # (Cloudflare deploy is decoupled), so it must not claim a Netlify URL
          # that was never published. When Netlify failed, the expression yields
          # an empty trailing line and only the Cloudflare row is listed.
          message: |
            ✅ Preview documentation is available now

            | Platform | URL |
            |---|---|
            | Cloudflare Pages | [https://pr-${{ steps.resolve-pr.outputs.number }}.handsontable-docs-staging.pages.dev/docs](https://pr-${{ steps.resolve-pr.outputs.number }}.handsontable-docs-staging.pages.dev/docs) |
            ${{ steps.netlify-publish.outcome == 'success' && format('| Netlify | [{0}/docs]({0}/docs) |', env.NETLIFY_SITE_URL) || '' }}

      - name: Post Cloudflare Pages apex summary
        if: ${{ !cancelled() && steps.cf-target.outputs.is_production == 'true' && steps.cf-pages-deploy.outcome == 'success' }}
        run: |
          echo "## ☁️ Staging docs deployed to Cloudflare Pages apex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production deployment of the staging project (branch \`develop\`)." >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://handsontable-docs-staging.pages.dev/docs" >> $GITHUB_STEP_SUMMARY

      - name: Post RC staging summary
        if: ${{ steps.release-info.outputs.is_release == 'true' }}
        run: |
          echo "## 🧪 RC Docs Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target version:** ${{ steps.release-info.outputs.target_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build mode:** production" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ env.NETLIFY_SITE_URL }}/docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This staging build uses production docs settings (BUILD_MODE=production) for release branch \`${{ steps.release-info.outputs.target_version }}\`." >> $GITHUB_STEP_SUMMARY
          echo "The published \`handsontable\` version from package.json (including any RC tag) is used in examples and CodeSandbox links." >> $GITHUB_STEP_SUMMARY
          echo "Use it to verify the docs before the final release." >> $GITHUB_STEP_SUMMARY

      - name: Fail if module size measurements errored
        if: ${{ steps.measure-module-sizes.outcome == 'failure' }}
        run: |
          echo "::error::Module size measurements failed. The docs were deployed but module-sizes.json may be stale."
          exit 1

      - name: Prepare RC docs failure Slack payload
        if: ${{ !cancelled() && failure() && steps.release-info.outputs.is_release == 'true' }}
        env:
          RC_VERSION: ${{ steps.release-info.outputs.target_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          MEASURE_OUTCOME: ${{ steps.measure-module-sizes.outcome }}
          BUILD_OUTCOME: ${{ steps.build-docs.outcome }}
          NETLIFY_OUTCOME: ${{ steps.netlify-publish.outcome }}
        run: |
          BRANCH='${{ github.ref_name }}'

          FAILURES=""
          if [ "$MEASURE_OUTCOME" = "failure" ]; then
            FAILURES="${FAILURES}• *Module size measurements* failed — \`module-sizes.json\` may be stale\n"
          fi
          if [ "$BUILD_OUTCOME" = "failure" ]; then
            FAILURES="${FAILURES}• *Docs build* failed\n"
          fi
          if [ "$NETLIFY_OUTCOME" = "failure" ]; then
            FAILURES="${FAILURES}• *Netlify publish* failed — preview may not be available\n"
          fi
          if [ -z "$FAILURES" ]; then
            FAILURES="• Unknown failure — check the Actions run for details\n"
          fi

          jq -n \
            --arg version  "${RC_VERSION}" \
            --arg branch   "${BRANCH}" \
            --arg run_url  "${RUN_URL}" \
            --arg repo_url "${REPO_URL}" \
            --arg failures "$FAILURES" \
          '{
            text: ("❌ RC docs staging failed for " + $version),
            blocks: [
              {
                type: "section",
                text: { type: "mrkdwn", text: (":x: *RC docs staging deployment failed for <" + $repo_url + "/tree/" + $branch + "|" + $version + ">*") }
              },
              {
                type: "section",
                text: { type: "mrkdwn", text: $failures }
              },
              {
                type: "context",
                elements: [{ type: "mrkdwn", text: ("<" + $run_url + "|🔗 View GitHub Actions run>") }]
              }
            ]
          }' > /tmp/slack-rc-docs-failure.json

      - name: Notify Slack on RC docs failure
        if: ${{ !cancelled() && failure() && steps.release-info.outputs.is_release == 'true' }}
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # https://github.com/slackapi/slack-github-action/releases/tag/v3.0.2
        with:
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-rc-docs-failure.json
