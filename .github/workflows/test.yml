  visual-tests-multi-framework:
    name: "[TEST] Visual tests: Multi-framework"
    runs-on: ubuntu-latest
    needs:
      - check-scope
      - build-handsontable-es-cjs
      - build-handsontable-umd
      - test-handsontable-e2e-main
      - test-handsontable-e2e-horizon
      - test-handsontable-e2e-classic
      - test-handsontable-e2e-min-main
      - test-handsontable-e2e-min-horizon
      - test-handsontable-e2e-min-classic
      - test-angular-wrapper
      - test-react-wrapper
      - test-vue3
    if: |
      !failure() && !cancelled() && (
        needs.build-handsontable-es-cjs.result == 'success' ||
        needs.check-scope.outputs.test-visual == 'true'
        )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # https://github.com/pnpm/action-setup/releases/tag/v4.2.0
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install && pnpm -r rebuild

      - name: Cache Playwright browsers (Chromium)
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # https://github.com/actions/cache/releases/tag/v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('visual-tests/package.json') }}

      - name: Install Playwright Chromium binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --no playwright install chromium
        working-directory: visual-tests

      - name: Install Playwright system dependencies
        run: npx --no playwright install-deps chromium
        working-directory: visual-tests

      - name: Download the Handsontable ES + CJS build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: handsontable-build-es-cjs
          path: ./handsontable-build-es-cjs
        continue-on-error: true
      - run: |
          if test -f "handsontable-build-es-cjs/tmp.tar.gz"; then
            tar -zxf handsontable-build-es-cjs/tmp.tar.gz
            rm -r handsontable-build-es-cjs
          else
            npm run in handsontable build:es
            npm run in handsontable build:commonjs
            npm run in handsontable build:languages.es
          fi

      - name: Download the Handsontable UMD build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: handsontable-build-umd
          path: ./handsontable-build-umd
        continue-on-error: true
      - run: |
          if test -f "handsontable-build-umd/dist.tar.gz"; then
            tar -zxf handsontable-build-umd/dist.tar.gz
            rm -r handsontable-build-umd
          else
            npm run in handsontable build:umd
            npm run in handsontable build:umd.min
            npm run in handsontable build:languages
            npm run in handsontable build:languages.min
          fi
          npm run in handsontable postbuild

      - name: Download the Angular wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: angular-wrapper-build
          path: ./angular-wrapper-build
        continue-on-error: true
      - run: |
          if test -f "angular-wrapper-build/angular-wrapper.tar.gz"; then
            tar -zxf angular-wrapper-build/angular-wrapper.tar.gz
            rm -r angular-wrapper-build
          else
            npm run in angular-wrapper build
          fi

      - name: Download the React wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: react-wrapper-build
          path: ./react-wrapper-build
        continue-on-error: true
      - run: |
          if test -f "react-wrapper-build/react-wrapper.tar.gz"; then
            tar -zxf react-wrapper-build/react-wrapper.tar.gz
            rm -r react-wrapper-build
          else
            npm run in react-wrapper build
          fi

      - name: Download the Vue3 wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: vue3-build
          path: ./vue3-build
        continue-on-error: true
      - run: |
          if test -f "vue3-build/vue3.tar.gz"; then
            tar -zxf vue3-build/vue3.tar.gz
            rm -r vue3-build
          else
            npm run in vue3 build
          fi

      - name: Build visual test examples
        run: npm run in visual-tests build

      - name: Run visual multi-framework tests
        run: npm run in visual-tests test

      - run: tar -zcf screenshots-multi.tar.gz ./visual-tests/screenshots

      - name: Upload the multi-framework screenshots artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: vt-screenshots-multi
          path: screenshots-multi.tar.gz

  visual-tests-cross-browser:
    name: "[TEST] Visual tests: Cross-browser"
    runs-on: ubuntu-latest
    needs:
      - check-scope
      - build-handsontable-es-cjs
      - build-handsontable-umd
      - test-handsontable-e2e-main
      - test-handsontable-e2e-horizon
      - test-handsontable-e2e-classic
      - test-handsontable-e2e-min-main
      - test-handsontable-e2e-min-horizon
      - test-handsontable-e2e-min-classic
      - test-angular-wrapper
      - test-react-wrapper
      - test-vue3
    if: |
      !failure() && !cancelled() && (
        needs.build-handsontable-es-cjs.result == 'success' ||
        needs.check-scope.outputs.test-visual == 'true'
        )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # https://github.com/pnpm/action-setup/releases/tag/v4.2.0
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install && pnpm -r rebuild

      - name: Cache Playwright browsers (all)
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # https://github.com/actions/cache/releases/tag/v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ runner.os }}-${{ hashFiles('visual-tests/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --no playwright install chromium firefox webkit
        working-directory: visual-tests

      - name: Install Playwright system dependencies
        run: npx --no playwright install-deps
        working-directory: visual-tests

      - name: Download the Handsontable ES + CJS build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: handsontable-build-es-cjs
          path: ./handsontable-build-es-cjs
        continue-on-error: true
      - run: |
          if test -f "handsontable-build-es-cjs/tmp.tar.gz"; then
            tar -zxf handsontable-build-es-cjs/tmp.tar.gz
            rm -r handsontable-build-es-cjs
          else
            npm run in handsontable build:es
            npm run in handsontable build:commonjs
            npm run in handsontable build:languages.es
          fi

      - name: Download the Handsontable UMD build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: handsontable-build-umd
          path: ./handsontable-build-umd
        continue-on-error: true
      - run: |
          if test -f "handsontable-build-umd/dist.tar.gz"; then
            tar -zxf handsontable-build-umd/dist.tar.gz
            rm -r handsontable-build-umd
          else
            npm run in handsontable build:umd
            npm run in handsontable build:umd.min
            npm run in handsontable build:languages
            npm run in handsontable build:languages.min
          fi
          npm run in handsontable postbuild

      - name: Download the Angular wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: angular-wrapper-build
          path: ./angular-wrapper-build
        continue-on-error: true
      - run: |
          if test -f "angular-wrapper-build/angular-wrapper.tar.gz"; then
            tar -zxf angular-wrapper-build/angular-wrapper.tar.gz
            rm -r angular-wrapper-build
          else
            npm run in angular-wrapper build
          fi

      - name: Download the React wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: react-wrapper-build
          path: ./react-wrapper-build
        continue-on-error: true
      - run: |
          if test -f "react-wrapper-build/react-wrapper.tar.gz"; then
            tar -zxf react-wrapper-build/react-wrapper.tar.gz
            rm -r react-wrapper-build
          else
            npm run in react-wrapper build
          fi

      - name: Download the Vue3 wrapper build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: vue3-build
          path: ./vue3-build
        continue-on-error: true
      - run: |
          if test -f "vue3-build/vue3.tar.gz"; then
            tar -zxf vue3-build/vue3.tar.gz
            rm -r vue3-build
          else
            npm run in vue3 build
          fi

      - name: Build visual test examples
        run: npm run in visual-tests build

      - name: Run visual cross-browser tests
        run: npm run in visual-tests test:cross-browser

      - run: tar -zcf screenshots-cross.tar.gz ./visual-tests/screenshots

      - name: Upload the cross-browser screenshots artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: vt-screenshots-cross
          path: screenshots-cross.tar.gz

  visual-tests-argos-upload:
    name: "[TEST] Visual tests: Argos upload"
    runs-on: ubuntu-latest
    needs:
      - visual-tests-multi-framework
      - visual-tests-cross-browser
    if: |
      !failure() && !cancelled() && (
        needs.visual-tests-multi-framework.result == 'success' ||
        needs.visual-tests-cross-browser.result == 'success'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0 # fetch all history to get the latest changes needed for Argos CI
          filter: blob:none # blobless clone: full commit graph without downloading file contents

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # https://github.com/pnpm/action-setup/releases/tag/v4.2.0
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install && pnpm -r rebuild

      - name: Download multi-framework screenshots
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: vt-screenshots-multi
          path: ./

      - name: Download cross-browser screenshots
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: vt-screenshots-cross
          path: ./

      - run: |
          tar -zxf screenshots-multi.tar.gz
          tar -zxf screenshots-cross.tar.gz

      - run: tar -zcf screenshots.tar.gz ./visual-tests/screenshots

      - name: Upload the test results artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: visual-tests-screenshots
          path: screenshots.tar.gz

      - name: Upload the screenshots to Argos CI
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: npm run in visual-tests upload
