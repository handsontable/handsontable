name: Docs delete Staging Deployment

on:
  pull_request:
    types: [closed]

defaults:
  run:
    working-directory: ./docs/

jobs:
  delete-preview-on-pull-request:
    name: Delete Cloudflare Pages previews
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Delete Cloudflare Pages deployments for branch
        if: always()
        continue-on-error: true
        run: node cloudflare/deleteDeployments.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: handsontable-docs-staging
          CF_BRANCH_NAME: pr-${{ github.event.pull_request.number }}
