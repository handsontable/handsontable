name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**' # Must match RELEASE_BRANCH_PREFIX
  release:
    types: [created]
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [develop]

env:
  RELEASE_BRANCH_PREFIX: 'release/'
  DOCS_BRANCH_PREFIX: 'prod-docs/'
  LTS_BRANCH_PREFIX: 'lts/'
  NPM_PUBLISH_VERSION: '11.6' # npm >= 11.5.1 required for trusted publishing (OIDC)

permissions:
  id-token: write  # Required for OIDC
  contents: write
  actions: read

jobs:
  # ============================================================
  # Scenario A — Pre-release (workflow_dispatch from non-release branch or automatically ran on develop after testing)
  # ============================================================
  pre-release:
    name: Build and publish a pre-release
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
        !startsWith(github.ref_name, 'release/') &&
        !startsWith(github.ref_name, 'lts/')) ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Determine branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ steps.branch.outputs.ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - run: |
          pnpm install
          npm install -g npm@11.6 # Ensure npm 11.5.1 or later for trusted publishing

      - name: Publish pre-release
        run: npm run pre-release

  # ============================================================
  # Scenario B — First RC (release event with prerelease flag)
  # ============================================================
  first-rc-build:
    name: Build first RC
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' &&
      github.event.release.prerelease == true
    outputs:
      release-branch: ${{ steps.create-branch.outputs.release-branch }}
      rc-version: ${{ steps.version.outputs.rc-version }}
    steps:
      - name: Extract version from release name
        id: version
        run: |
          # Release name is like "1.0.0-rc" → strip "-rc" to get "1.0.0"
          RELEASE_NAME='${{ github.event.release.name }}'
          VERSION="${RELEASE_NAME%-rc}"
          RC_VERSION="${VERSION}-rc1"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "rc-version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION} (RC: ${RC_VERSION})"

      - name: Checkout develop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: develop
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          node -e "
            import { isVersionValid } from './scripts/utils/pre-release.mjs';

            if (!isVersionValid('${VERSION}')) {
              console.error('Error: Invalid version format: ${VERSION}');
              process.exit(1);
            }
          "

      - name: Check npm version
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          node -e "
            import semver from 'semver';

            if (!semver.satisfies('${NPM_VERSION}'.trim(), '>=7.17.0')) {
              console.error('Error: npm >= 7.17.0 required (found ${NPM_VERSION})');
              process.exit(1);
            }
          "

      - name: Create release branch
        id: create-branch
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RELEASE_BRANCH="${RELEASE_BRANCH_PREFIX}${VERSION}"
          echo "release-branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${RELEASE_BRANCH}"

      - name: Set version and release date
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION="${VERSION}-rc1"
          RELEASE_DATE=$(date +%d/%m/%Y)
          node -e "
            import { setVersion, setReleaseDate } from './scripts/utils/pre-release.mjs';

            setVersion('${RC_VERSION}');
            setReleaseDate('${RELEASE_DATE}');
          "

      - name: Clean node_modules and lock files
        run: |
          node -e "
            import { cleanNodeModules } from './scripts/utils/filesystem.mjs';

            cleanNodeModules();
          "

      - name: Install fresh dependencies
        run: pnpm install --force

      - name: Clean old package builds
        run: npm run all clean -- --e examples

      - name: Build all packages
        run: npm run all build -- --e examples visual-tests

      - name: Install next package for examples
        run: npm run examples:install next

      - name: Build examples
        run: npm run in examples build

      - name: Run Examples tests
        run: npm run in examples test

      - name: Verify bundles
        run: node ./scripts/verify-bundles.mjs

      - name: Pack tarballs
        run: mkdir _tmp_packs && npm run all create-package -- --e examples --cmdArgs pack-destination="$(pwd)/_tmp_packs/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: npm_packs_${{ steps.version.outputs.rc-version }}
          path: _tmp_packs/

      - name: Clean up tarballs
        run: rm -rf _tmp_packs

      - name: Generate changelog
        run: npm run changelog consume < /dev/null

      - name: Extract changelog for this version
        id: changelog
        run: |
          RC_VERSION='${{ steps.version.outputs.rc-version }}'
          CONTENT=$(node .github/scripts/extract-changelog.mjs "$RC_VERSION")
          {
            echo "content<<EOF"
            printf '%s\n' "$CONTENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update docs changelog
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
        run: node .github/scripts/update-docs-changelog.mjs '${{ steps.version.outputs.rc-version }}'

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION="${VERSION}-rc1"
          RELEASE_BRANCH='${{ steps.create-branch.outputs.release-branch }}'

          git add .

          git commit -m "${RC_VERSION}" || echo "No changes to commit"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -u origin "${RELEASE_BRANCH}"

          # Create tag via GitHub API so it's automatically verified
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${RC_VERSION}" \
            -f sha="$(git rev-parse HEAD)"

      - name: Update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.content }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION="${VERSION}-rc1"
          RELEASE_TAG="${VERSION}-rc"

          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          gh release edit "${RELEASE_TAG}" --tag "${RC_VERSION}" --repo "${{ github.repository }}" --notes-file /tmp/release-notes.md
          echo "Updated release '${RELEASE_TAG}' to point to tag '${RC_VERSION}'"

      - name: Publication summary
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION="${VERSION}-rc1"
          RELEASE_BRANCH='${{ steps.create-branch.outputs.release-branch }}'
          RELEASE_NAME='${{ github.event.release.name }}'
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🚀 Pre-release Publication Summary

          > The following release candidate is ready to be published to npm.

          ## 📦 Package Details

          | Property | Value |
          |----------|-------|
          | **Version** | \`${RC_VERSION}\` |
          | **npm Tag** | \`rc\` |
          | **Branch** | \`${RELEASE_BRANCH}\` |
          | **Release Name** | ${RELEASE_NAME} |

          ## ⏳ Awaiting Approval

          This job will proceed once approved by the \`approvers\` environment.
          Review the details above and approve the deployment to publish to npm.

          ---
          _Triggered by **${{ github.actor }}** on **${{ github.ref_name }}**_
          EOF

  first-rc-test:
    name: Run tests (first RC)
    needs: [first-rc-build]
    uses: ./.github/workflows/test.yml
    with:
      test-all: true
    secrets: inherit

  first-rc-publish:
    name: Publish first RC
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.first-rc-build.result == 'success' && needs.first-rc-test.result == 'success' }}
    needs: [first-rc-build, first-rc-test]
    environment: approvers
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.first-rc-build.outputs.release-branch }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org/

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.first-rc-build.outputs.rc-version }}
          path: _tmp_packs/

      - name: Publish
        run: |
          npm install -g npm@${{ env.NPM_PUBLISH_VERSION }} # Ensure npm 11.5.1 or later for trusted publishing
          echo "Publishing packages from _tmp_packs/ with tag: rc"
          for TARBALL in _tmp_packs/*.tgz; do
            echo "Publishing: $(basename "$TARBALL")"
            npm publish "./$TARBALL" --tag rc
          done
          echo "All packages published successfully."

  # ============================================================
  # Scenario B.1 — First RC NuGet build and publish
  # ============================================================
  first-rc-build-nuget:
    name: Build NuGet package (first RC)
    runs-on: ubuntu-latest
    needs: [first-rc-build]
    if: ${{ !cancelled() && needs.first-rc-build.result == 'success' }}
    outputs:
      rc-version: ${{ needs.first-rc-build.outputs.rc-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.first-rc-build.outputs.release-branch }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download npm build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.first-rc-build.outputs.rc-version }}
          path: _tmp_packs/

      - name: Unpack handsontable tarball
        run: |
          mkdir -p handsontable/tmp
          tar -xzf _tmp_packs/handsontable-${{ needs.first-rc-build.outputs.rc-version }}.tgz \
            -C handsontable/tmp --strip-components=1

      - name: Install nuget
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
          curl -o /tmp/nuget.exe https://dist.nuget.org/win-x86-commandline/v7.3.0/nuget.exe
          sudo bash -c 'echo "#!/bin/bash" > /usr/local/bin/nuget && echo "exec mono /tmp/nuget.exe \"\$@\"" >> /usr/local/bin/nuget && chmod +x /usr/local/bin/nuget'

      - name: Generate NuGet package
        run: node .github/scripts/generate-nuget-package.mjs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: nuget_pack_${{ needs.first-rc-build.outputs.rc-version }}
          path: Handsontable.*.nupkg

      - name: Clean up NuGet package
        run: rm -f Handsontable.*.nupkg

  first-rc-publish-nuget:
    name: Publish NuGet package (first RC)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.first-rc-build.result == 'success' && needs.first-rc-test.result == 'success' && needs.first-rc-build-nuget.result == 'success' }}
    needs: [first-rc-build, first-rc-test, first-rc-build-nuget]
    environment: approvers
    steps:
      - name: Download NuGet package artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: nuget_pack_${{ needs.first-rc-build.outputs.rc-version }}

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # https://github.com/NuGet/login/releases/tag/v1.2.0
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        run: |
          NUPKG=$(ls *.nupkg)
          echo "Publishing: $NUPKG"
          dotnet nuget push "$NUPKG" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

  first-rc-notify:
    name: Notify Slack (first RC)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.first-rc-publish.result != 'skipped' }}
    needs: [first-rc-build, first-rc-publish, first-rc-publish-nuget]
    steps:
      - name: Prepare and send Slack message
        env:
          RC_VERSION: ${{ needs.first-rc-build.outputs.rc-version }}
          RELEASE_BRANCH: ${{ needs.first-rc-build.outputs.release-branch }}
          NPM_RESULT: ${{ needs.first-rc-publish.result }}
          NUGET_RESULT: ${{ needs.first-rc-publish-nuget.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ "$NPM_RESULT" = "success" ]; then
            STATUS=":white_check_mark: Success"; NPM_STATUS=":white_check_mark: :npm: *npm*"; NPM_OK="true"
          else
            STATUS=":x: Failed"; NPM_STATUS=":x: :npm: *npm*"; NPM_OK="false"
          fi
          if [ "$NUGET_RESULT" = "success" ]; then NUGET_STATUS=":white_check_mark: :nuget: *NuGet*"; else NUGET_STATUS=":x: :nuget: *NuGet*"; fi
          BASE_VERSION_DASHES=$(echo "$RC_VERSION" | sed 's/-rc[0-9]*//' | tr '.' '-')
          DOCS_URL="https://rc-${BASE_VERSION_DASHES}.handsontable-docs-staging.pages.dev/docs/javascript-data-grid/"
          CHANGELOG_URL="${REPO_URL}/blob/${RELEASE_BRANCH}/CHANGELOG.md"

          jq -n \
            --arg version       "${RC_VERSION}" \
            --arg branch        "${RELEASE_BRANCH}" \
            --arg status        "$STATUS" \
            --arg npm_status    "$NPM_STATUS" \
            --arg npm_ok        "$NPM_OK" \
            --arg nuget_status  "$NUGET_STATUS" \
            --arg docs_url      "$DOCS_URL" \
            --arg changelog_url "$CHANGELOG_URL" \
            --arg repo_url      "${REPO_URL}" \
            --arg run_url       "${RUN_URL}" \
          '{
            text: (if $npm_ok == "true" then "🚀 Version " + $version + " released!" else "❌ Release of version " + $version + " failed." end),
            blocks: [
              (if $npm_ok == "true" then
                { type: "header", text: { type: "plain_text", text: ("🚀 Version " + $version + " released!"), emoji: true } }
              else
                { type: "section", text: { type: "mrkdwn", text: (":x: *Release of version " + $version + " failed.* Check the <" + $run_url + "|GitHub Actions run> for details.") } }
              end),
              {
                type: "section",
                text: { type: "mrkdwn", text: "⚠️ *This is a pre-release.* Not intended for production use." }
              },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: ("*Status*\n" + $status) },
                  { type: "mrkdwn", text: "*Type*\n🔖 Pre-release" },
                  { type: "mrkdwn", text: ("*Version*\n<https://www.npmjs.com/package/handsontable/v/" + $version + "|" + $version + ">") },
                  { type: "mrkdwn", text: ("*Branch*\n<" + $repo_url + "/tree/" + $branch + "|" + $branch + ">") }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: ":white_check_mark: :github: *GitHub*" },
                  { type: "mrkdwn", text: $npm_status },
                  { type: "mrkdwn", text: $nuget_status }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ("*📋 Changelog*\n<" + $changelog_url + "|View CHANGELOG.md>" + if $npm_ok == "true" then "\n\n*🎮 Demos*\n• :javascript: <https://handsontable.com/codesandbox-vm?example-dir=javascript&handsontable-version=" + $version + "|JS>\n• :react: <https://handsontable.com/codesandbox-vm?example-dir=react&handsontable-version=" + $version + "|React>\n• :angular: <https://handsontable.com/codesandbox-vm?example-dir=angular&handsontable-version=" + $version + "|Angular>\n• :vue: <https://handsontable.com/codesandbox-vm?example-dir=vue&handsontable-version=" + $version + "|Vue>\n• :typescript: <https://handsontable.com/codesandbox-vm?example-dir=typescript&handsontable-version=" + $version + "|TypeScript>\n\n*📖 RC Docs*\n• :chrome: <" + $docs_url + "|View RC Docs Preview>" else "" end)
                }
              },
              {
                type: "context",
                elements: [{ type: "mrkdwn", text: ("<" + $run_url + "|🔗 View GitHub Actions run>") }]
              }
            ]
          }' > /tmp/slack-payload.json
          echo "Slack payload:"
          cat /tmp/slack-payload.json

      - name: Notify Slack
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # https://github.com/slackapi/slack-github-action/releases/tag/v3.0.2
        with:
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json

  # ============================================================
  # Scenario C — Subsequent RC (push to release/**)
  # ============================================================
  rc-check:
    name: Guard RC build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          REF_NAME='${{ github.ref_name }}'
          VERSION="${REF_NAME#${RELEASE_BRANCH_PREFIX}}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if stable release already exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          STABLE_COUNT=$(gh release list --repo "${{ github.repository }}" --json tagName,isPrerelease \
            --jq "[.[] | select(.tagName == \"${VERSION}\" and (.isPrerelease | not))] | length")
          if [ "$STABLE_COUNT" -gt 0 ]; then
            echo "::notice::Stable release ${VERSION} already exists — skipping RC build."
            echo "allowed=false" >> $GITHUB_OUTPUT
          else
            echo "allowed=true" >> $GITHUB_OUTPUT
          fi

  rc-build:
    name: Build RC
    runs-on: ubuntu-latest
    needs: [rc-check]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/') && needs.rc-check.outputs.allowed == 'true'
    outputs:
      rc-version: ${{ steps.rc-version.outputs.rc-version }}
      changelog-synced: ${{ steps.sync-changelog.outputs.synced }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          REF_NAME='${{ github.ref_name }}'
          VERSION="${REF_NAME#${RELEASE_BRANCH_PREFIX}}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version from branch: ${VERSION}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check npm version
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          node -e "
            import semver from 'semver';

            if (!semver.satisfies('${NPM_VERSION}'.trim(), '>=7.17.0')) {
              console.error('Error: npm >= 7.17.0 required (found ${NPM_VERSION})');
              process.exit(1);
            }
          "

      - name: Determine next RC version
        id: rc-version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          echo "Determining next RC version for ${VERSION}..."

          git fetch --tags
          HIGHEST_RC=$(git tag --list "${VERSION}-rc*" | sed -n "s/^${VERSION}-rc\([0-9]\+\)$/\1/p" | sort -n | tail -n 1)

          if [ -z "$HIGHEST_RC" ]; then
            echo "No existing RC tags found for ${VERSION}, starting at rc1"
            RC_VERSION="${VERSION}-rc1"
          else
            echo "Highest existing RC tag: ${VERSION}-rc${HIGHEST_RC}"
            RC_VERSION="${VERSION}-rc$((HIGHEST_RC + 1))"
          fi

          echo "rc-version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "Next RC version: ${RC_VERSION}"

      - name: Set version and release date
        run: |
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'
          RELEASE_DATE=$(date +%d/%m/%Y)
          node -e "
            import { setVersion, setReleaseDate } from './scripts/utils/pre-release.mjs';

            setVersion('${RC_VERSION}');
            setReleaseDate('${RELEASE_DATE}');
          "

      - name: Update lockfile for version change
        run: pnpm install --lockfile-only

      - name: Clean old package builds
        run: npm run all clean -- --e examples

      - name: Build all packages
        run: npm run all build -- --e examples visual-tests

      - name: Verify bundles
        run: node ./scripts/verify-bundles.mjs

      - name: Pack tarballs
        run: mkdir _tmp_packs && npm run all create-package -- --e examples --cmdArgs pack-destination="$(pwd)/_tmp_packs/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: npm_packs_${{ steps.rc-version.outputs.rc-version }}
          path: _tmp_packs/

      - name: Clean up tarballs
        run: rm -rf _tmp_packs

      - name: Update changelog RC version and date
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'
          TODAY=$(date +%Y-%m-%d)
          PATTERN="^## \[${VERSION}-rc[0-9]\+\] - [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$"

          MATCHES=$(grep -c "$PATTERN" CHANGELOG.md || true)
          if [ "$MATCHES" -ne 1 ]; then
            echo "::error::Expected exactly 1 matching line in CHANGELOG.md for version ${VERSION}-rcX, found ${MATCHES}"
            exit 1
          fi

          sed -i "s/${PATTERN}/## [${RC_VERSION}] - ${TODAY}/" CHANGELOG.md
          echo "Updated CHANGELOG.md: ## [${RC_VERSION}] - ${TODAY}"

      - name: Sync pending changelog entries
        id: sync-changelog
        run: |
          if ls .changelogs/*.json 2>/dev/null | grep -q .; then
            npm run changelog sync < /dev/null
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "No pending changelog entries to sync."
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'
          CONTENT=$(node .github/scripts/extract-changelog.mjs "$RC_VERSION")
          {
            echo "content<<EOF"
            printf '%s\n' "$CONTENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update docs changelog
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
        run: node .github/scripts/update-docs-changelog.mjs '${{ steps.rc-version.outputs.rc-version }}'

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          git commit -m "${RC_VERSION}" || echo "No changes to commit"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ github.ref_name }}

          # Create tag via GitHub API so it's automatically verified
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${RC_VERSION}" \
            -f sha="$(git rev-parse HEAD)"

      - name: Update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.content }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'
          RC_NUMBER=$(echo "$RC_VERSION" | sed -n "s/^${VERSION}-rc\([0-9]\+\)$/\1/p")
          PREVIOUS_TAG="${VERSION}-rc$((RC_NUMBER - 1))"

          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          gh release edit "${PREVIOUS_TAG}" --tag "${RC_VERSION}" --repo "${{ github.repository }}" --notes-file /tmp/release-notes.md
          echo "Updated release '${PREVIOUS_TAG}' to point to tag '${RC_VERSION}'"

      - name: Publication summary
        run: |
          RC_VERSION='${{ steps.rc-version.outputs.rc-version }}'
          BRANCH='${{ github.ref_name }}'
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🚀 Pre-release Publication Summary

          > The following release candidate is ready to be published to npm.

          ## 📦 Package Details

          | Property | Value |
          |----------|-------|
          | **Version** | \`${RC_VERSION}\` |
          | **npm Tag** | \`rc\` |
          | **Branch** | \`${BRANCH}\` |

          ## ⏳ Awaiting Approval

          This job will proceed once approved by the \`approvers\` environment.
          Review the details above and approve the deployment to publish to npm.

          ---
          _Triggered by **${{ github.actor }}** on **${{ github.ref_name }}**_
          EOF

  rc-test:
    name: Run tests (RC)
    needs: [rc-build]
    uses: ./.github/workflows/test.yml
    with:
      test-all: true
    secrets: inherit

  rc-publish:
    name: Publish RC
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.rc-build.result == 'success' && needs.rc-test.result == 'success' }}
    needs: [rc-build, rc-test]
    environment: approvers
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org/

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.rc-build.outputs.rc-version }}
          path: _tmp_packs/

      - name: Publish
        run: |
          npm install -g npm@${{ env.NPM_PUBLISH_VERSION }} # Ensure npm 11.5.1 or later for trusted publishing
          echo "Publishing packages from _tmp_packs/ with tag: rc"
          for TARBALL in _tmp_packs/*.tgz; do
            echo "Publishing: $(basename "$TARBALL")"
            npm publish "./$TARBALL" --tag rc
          done
          echo "All packages published successfully."

  # ============================================================
  # Scenario C.1 — Subsequent RC NuGet build and publish
  # ============================================================
  rc-build-nuget:
    name: Build NuGet package (RC)
    runs-on: ubuntu-latest
    needs: [rc-build]
    if: ${{ !cancelled() && needs.rc-build.result == 'success' }}
    outputs:
      rc-version: ${{ needs.rc-build.outputs.rc-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download npm build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.rc-build.outputs.rc-version }}
          path: _tmp_packs/

      - name: Unpack handsontable tarball
        run: |
          mkdir -p handsontable/tmp
          tar -xzf _tmp_packs/handsontable-${{ needs.rc-build.outputs.rc-version }}.tgz \
            -C handsontable/tmp --strip-components=1

      - name: Install nuget
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
          curl -o /tmp/nuget.exe https://dist.nuget.org/win-x86-commandline/v7.3.0/nuget.exe
          sudo bash -c 'echo "#!/bin/bash" > /usr/local/bin/nuget && echo "exec mono /tmp/nuget.exe \"\$@\"" >> /usr/local/bin/nuget && chmod +x /usr/local/bin/nuget'

      - name: Generate NuGet package
        run: node .github/scripts/generate-nuget-package.mjs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: nuget_pack_${{ needs.rc-build.outputs.rc-version }}
          path: Handsontable.*.nupkg

      - name: Clean up NuGet package
        run: rm -f Handsontable.*.nupkg

  rc-publish-nuget:
    name: Publish NuGet package (RC)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.rc-build.result == 'success' && needs.rc-test.result == 'success' && needs.rc-build-nuget.result == 'success' }}
    needs: [rc-build, rc-test, rc-build-nuget]
    environment: approvers
    steps:
      - name: Download NuGet package artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: nuget_pack_${{ needs.rc-build.outputs.rc-version }}

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # https://github.com/NuGet/login/releases/tag/v1.2.0
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        run: |
          NUPKG=$(ls *.nupkg)
          echo "Publishing: $NUPKG"
          dotnet nuget push "$NUPKG" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

  rc-notify:
    name: Notify Slack (RC)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.rc-publish.result != 'skipped' }}
    needs: [rc-build, rc-publish, rc-publish-nuget]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Prepare and send Slack message
        env:
          RC_VERSION: ${{ needs.rc-build.outputs.rc-version }}
          CHANGELOG_SYNCED: ${{ needs.rc-build.outputs.changelog-synced }}
          NPM_RESULT: ${{ needs.rc-publish.result }}
          NUGET_RESULT: ${{ needs.rc-publish-nuget.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ "$NPM_RESULT" = "success" ]; then
            STATUS=":white_check_mark: Success"; NPM_STATUS=":white_check_mark: :npm: *npm*"; NPM_OK="true"
          else
            STATUS=":x: Failed"; NPM_STATUS=":x: :npm: *npm*"; NPM_OK="false"
          fi
          if [ "$NUGET_RESULT" = "success" ]; then NUGET_STATUS=":white_check_mark: :nuget: *NuGet*"; else NUGET_STATUS=":x: :nuget: *NuGet*"; fi

          BASE_VERSION=$(echo "$RC_VERSION" | sed 's/-rc[0-9]*//')
          RC_NUMBER=$(echo "$RC_VERSION" | sed -n 's/.*-rc\([0-9]*\)/\1/p')
          PREV_TAG="${BASE_VERSION}-rc$((RC_NUMBER - 1))"
          BASE_VERSION_DASHES=$(echo "$BASE_VERSION" | tr '.' '-')
          DOCS_URL="https://rc-${BASE_VERSION_DASHES}.handsontable-docs-staging.pages.dev/docs/javascript-data-grid/"
          RELEASE_BRANCH="${{ github.ref_name }}"
          CHANGELOG_URL="${REPO_URL}/blob/${RELEASE_BRANCH}/CHANGELOG.md"

          git fetch --unshallow 2>/dev/null || true
          git fetch --tags --quiet

          COMMITS_TEXT=""

          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%H %s" --no-merges)

            if [ -n "$COMMITS" ]; then
              while IFS= read -r line; do
                SHA=$(echo "$line" | cut -d' ' -f1)
                MSG=$(echo "$line" | cut -d' ' -f2-)
                COMMITS_TEXT="${COMMITS_TEXT}• <${REPO_URL}/commit/${SHA}|${MSG}>"$'\n'
              done <<< "$COMMITS"
            fi
          fi

          if [ -z "$COMMITS_TEXT" ]; then
            COMMITS_TEXT="No commits found since \`${PREV_TAG}\`."
          fi

          jq -n \
            --arg version          "${RC_VERSION}" \
            --arg branch           "${RELEASE_BRANCH}" \
            --arg status           "$STATUS" \
            --arg npm_status       "$NPM_STATUS" \
            --arg npm_ok           "$NPM_OK" \
            --arg nuget_status     "$NUGET_STATUS" \
            --arg docs_url         "$DOCS_URL" \
            --arg prev_tag         "${PREV_TAG}" \
            --arg commits          "$COMMITS_TEXT" \
            --arg changelog_synced "${CHANGELOG_SYNCED}" \
            --arg changelog_url    "$CHANGELOG_URL" \
            --arg run_url          "${RUN_URL}" \
            --arg repo_url         "${REPO_URL}" \
          '{
            text: (if $npm_ok == "true" then "🚀 Version " + $version + " released!" else "❌ Release of version " + $version + " failed." end),
            blocks: [
              (if $npm_ok == "true" then
                { type: "header", text: { type: "plain_text", text: ("🚀 Version " + $version + " released!"), emoji: true } }
              else
                { type: "section", text: { type: "mrkdwn", text: (":x: *Release of version " + $version + " failed.* Check the <" + $run_url + "|GitHub Actions run> for details.") } }
              end),
              {
                type: "section",
                text: { type: "mrkdwn", text: "⚠️ *This is a pre-release.* Not intended for production use." }
              },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: ("*Status*\n" + $status) },
                  { type: "mrkdwn", text: "*Type*\n🔖 Pre-release" },
                  { type: "mrkdwn", text: ("*Version*\n<https://www.npmjs.com/package/handsontable/v/" + $version + "|" + $version + ">") },
                  { type: "mrkdwn", text: ("*Branch*\n<" + $repo_url + "/tree/" + $branch + "|" + $branch + ">") }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: ":white_check_mark: :github: *GitHub*" },
                  { type: "mrkdwn", text: $npm_status },
                  { type: "mrkdwn", text: $nuget_status }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                text: { type: "mrkdwn", text: ("*Commits since `" + $prev_tag + "`*\n" + $commits) }
              },
              if $changelog_synced == "true" then
                {
                  type: "context",
                  elements: [{ type: "mrkdwn", text: "❗ *Changelog extended with new entries!*" }]
                }
              else empty end,
              { type: "divider" },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ("*📋 Changelog*\n<" + $changelog_url + "|View CHANGELOG.md>" + if $npm_ok == "true" then "\n\n*🎮 Demos*\n• :javascript: <https://handsontable.com/codesandbox-vm?example-dir=javascript&handsontable-version=" + $version + "|JS>\n• :react: <https://handsontable.com/codesandbox-vm?example-dir=react&handsontable-version=" + $version + "|React>\n• :angular: <https://handsontable.com/codesandbox-vm?example-dir=angular&handsontable-version=" + $version + "|Angular>\n• :vue: <https://handsontable.com/codesandbox-vm?example-dir=vue&handsontable-version=" + $version + "|Vue>\n• :typescript: <https://handsontable.com/codesandbox-vm?example-dir=typescript&handsontable-version=" + $version + "|TypeScript>\n\n*📖 RC Docs*\n• :chrome: <" + $docs_url + "|View RC Docs Preview>" else "" end)
                }
              },
              {
                type: "context",
                elements: [{ type: "mrkdwn", text: ("<" + $run_url + "|🔗 View GitHub Actions run>") }]
              }
            ]
          }' > /tmp/slack-payload.json
          echo "Slack payload:"
          cat /tmp/slack-payload.json

      - name: Notify Slack
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # https://github.com/slackapi/slack-github-action/releases/tag/v3.0.2
        with:
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json

  # ============================================================
  # Scenario D — Stable release (release event, not prerelease)
  # ============================================================
  stable-prepare:
    name: Prepare stable release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' &&
      github.event.release.prerelease == false
    outputs:
      version: ${{ steps.version.outputs.version }}
      release-branch: ${{ steps.version.outputs.release-branch }}
    steps:
      - name: Extract and validate version
        id: version
        run: |
          TAG='${{ github.event.release.tag_name }}'
          VERSION="${TAG#v}"
          RELEASE_BRANCH="${RELEASE_BRANCH_PREFIX}${VERSION}"
          TARGET='${{ github.event.release.target_commitish }}'

          if [ "${TARGET}" != "${RELEASE_BRANCH}" ]; then
            echo "::error::Release target (${TARGET}) doesn't match expected branch (${RELEASE_BRANCH})"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release-branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Release branch: ${RELEASE_BRANCH}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ steps.version.outputs.release-branch }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          node -e "
            import { isVersionValid } from './scripts/utils/pre-release.mjs';

            if (!isVersionValid('${VERSION}')) {
              console.error('Error: Invalid version format: ${VERSION}');
              process.exit(1);
            }
          "

      - name: Check npm version
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          node -e "
            import semver from 'semver';

            if (!semver.satisfies('${NPM_VERSION}'.trim(), '>=7.17.0')) {
              console.error('Error: npm >= 7.17.0 required (found ${NPM_VERSION})');
              process.exit(1);
            }
          "

      - name: Set stable version
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RELEASE_DATE=$(date +%d/%m/%Y)
          node -e "
            import { setVersion, setReleaseDate } from './scripts/utils/pre-release.mjs';

            setVersion('${VERSION}');
            setReleaseDate('${RELEASE_DATE}');
          "

      - name: Update lockfile for version change
        run: pnpm install --lockfile-only

      - name: Update changelog release date
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          TODAY=$(date +%Y-%m-%d)
          STABLE_PATTERN="^## \[${VERSION}\] - [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$"
          PATTERN="^## \[${VERSION}-rc[0-9]\+\] - [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$"

          if grep -q "$STABLE_PATTERN" CHANGELOG.md; then
            echo "::notice::CHANGELOG.md already updated for ${VERSION} — skipping."
          else
            MATCHES=$(grep -c "$PATTERN" CHANGELOG.md || true)
            if [ "$MATCHES" -ne 1 ]; then
              echo "::error::Expected exactly 1 matching line in CHANGELOG.md for version ${VERSION}-rcX, found ${MATCHES}"
              exit 1
            fi

            sed -i "s/${PATTERN}/## [${VERSION}] - ${TODAY}/" CHANGELOG.md
            echo "Updated CHANGELOG.md: ## [${VERSION}] - ${TODAY}"
          fi

      - name: Update docs changelog
        run: node .github/scripts/update-docs-changelog.mjs '${{ steps.version.outputs.version }}'

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          RELEASE_BRANCH='${{ steps.version.outputs.release-branch }}'

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          git commit -m "${VERSION}" || echo "No changes to commit"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${RELEASE_BRANCH}

          # GitHub already created the tag when the release was published — no tag creation needed here.
          echo "Skipping tag creation — already created by GitHub release event"

      - name: Update GitHub release description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          CONTENT=$(node .github/scripts/extract-changelog.mjs "$VERSION")
          printf '%s' "$CONTENT" > /tmp/release-notes.md
          gh release edit "${VERSION}" --repo "${{ github.repository }}" --notes-file /tmp/release-notes.md
          echo "Updated release description for ${VERSION}"

  stable-merge:
    name: Merge release to develop and master
    runs-on: ubuntu-latest
    needs: [stable-prepare]
    outputs:
      version: ${{ needs.stable-prepare.outputs.version }}
      release-branch: ${{ needs.stable-prepare.outputs.release-branch }}
      develop-merge-pr: ${{ steps.merge-develop.outputs.pr-url }}
      develop-merge-result: ${{ steps.merge-develop.outcome }}
    steps:
      - name: Generate release bot token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # https://github.com/actions/create-github-app-token/releases/tag/v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.stable-prepare.outputs.release-branch }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check merge compatibility (master)
        run: |
          RELEASE_BRANCH='${{ needs.stable-prepare.outputs.release-branch }}'

          git fetch origin develop master

          # Only dry-run master — develop conflicts are handled gracefully via PR.
          git checkout -b _dry_master origin/master

          if ! git merge --no-commit --no-ff origin/${RELEASE_BRANCH} 2>/dev/null; then
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            UNEXPECTED=$(echo "$CONFLICTS" | grep -v '^pnpm-lock.yaml$' || true)

            if [ -n "$UNEXPECTED" ]; then
              echo "::error::Conflicts with master require human attention:"
              echo "$UNEXPECTED" | while IFS= read -r f; do echo "  - $f"; done
              git merge --abort 2>/dev/null || true
              git checkout -
              git branch -D _dry_master
              exit 1
            else
              echo "::notice::master: pnpm-lock.yaml conflict will be auto-resolved"
            fi

            git merge --abort 2>/dev/null || true
          else
            git reset --merge
          fi

          git checkout -
          git branch -D _dry_master

      - name: Merge to develop
        id: merge-develop
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          RELEASE_BRANCH='${{ needs.stable-prepare.outputs.release-branch }}'

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git checkout develop

          if ! git merge origin/${RELEASE_BRANCH} --no-edit; then
            UNRESOLVED=$(git diff --name-only --diff-filter=U)
            UNEXPECTED=$(echo "$UNRESOLVED" | grep -v '^pnpm-lock.yaml$' || true)

            if [ -n "$UNEXPECTED" ]; then
              echo "::warning::Conflicts merging release to develop — creating a PR for manual resolution."
              git merge --abort

              # Check if a merge PR already exists before pushing (idempotent for workflow re-runs)
              MERGE_BRANCH="merge/${RELEASE_BRANCH##*/}-to-develop"
              EXISTING_PR=$(gh pr list --base develop --head "${MERGE_BRANCH}" --json url --jq '.[0].url // empty')

              if [ -n "$EXISTING_PR" ]; then
                PR_URL="$EXISTING_PR"
                echo "::notice::Merge PR already exists: ${PR_URL}"
              else
                git checkout -b "${MERGE_BRANCH}" origin/${RELEASE_BRANCH}
                git push -u origin "${MERGE_BRANCH}"

                PR_URL=$(gh pr create \
                  --base develop \
                  --head "${MERGE_BRANCH}" \
                  --title "Merge ${RELEASE_BRANCH} back to develop" \
                  --body "Automatic merge from the release workflow had conflicts that need manual resolution.")
                echo "::notice::PR created for manual merge to develop: ${PR_URL}"
              fi

              echo "pr-url=${PR_URL}" >> $GITHUB_OUTPUT
            else
              git checkout --ours pnpm-lock.yaml
              pnpm install --lockfile-only
              git add pnpm-lock.yaml
              git commit --no-edit
              git push origin develop
            fi
          else
            git push origin develop
          fi

      - name: Merge to master
        env:
          RELEASE_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          RELEASE_BRANCH='${{ needs.stable-prepare.outputs.release-branch }}'

          # Clean up any leftover merge/dirty state from the develop step
          git merge --abort 2>/dev/null || true
          git reset --hard HEAD

          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

          git checkout master

          if ! git merge origin/${RELEASE_BRANCH} --no-edit; then
            UNRESOLVED=$(git diff --name-only --diff-filter=U)
            UNEXPECTED=$(echo "$UNRESOLVED" | grep -v '^pnpm-lock.yaml$' || true)

            if [ -n "$UNEXPECTED" ]; then
              echo "::error::Unexpected conflicts during merge to master: $UNEXPECTED"
              git merge --abort
              exit 1
            fi

            git checkout --ours pnpm-lock.yaml
            pnpm install --lockfile-only
            git add pnpm-lock.yaml
            git commit --no-edit
          fi

          git push origin master

      - name: Move version tag to post-merge master commit
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          VERSION='${{ needs.stable-prepare.outputs.version }}'
          NEW_SHA=$(git rev-parse HEAD) # HEAD is master after the merge step

          gh api repos/${{ github.repository }}/git/refs/tags/${VERSION} \
            -X PATCH \
            -f sha="$NEW_SHA" \
            -F force=true

          echo "Tag ${VERSION} updated to ${NEW_SHA} (post-merge master)"

      - name: Create LTS branch for previous even major version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ needs.stable-prepare.outputs.version }}'
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Only proceed for x.0.0 versions
          if [ "$MINOR" != "0" ] || [ "$PATCH" != "0" ]; then
            echo "Not a x.0.0 version ($VERSION), skipping LTS branch creation"
            exit 0
          fi

          PREV_MAJOR=$((MAJOR - 1))

          # Only create LTS branch if previous major is even
          if [ $((PREV_MAJOR % 2)) -ne 0 ]; then
            echo "Previous major version ($PREV_MAJOR) is odd, skipping LTS branch creation"
            exit 0
          fi

          LTS_BRANCH="${LTS_BRANCH_PREFIX}${PREV_MAJOR}.x"

          # Check if LTS branch already exists
          if git ls-remote --heads origin "$LTS_BRANCH" | grep -q "$LTS_BRANCH"; then
            echo "LTS branch $LTS_BRANCH already exists, skipping"
            exit 0
          fi

          # Find the latest non-prerelease tag for the previous major version
          git fetch --tags origin
          LATEST_TAG=$(git tag --list "${PREV_MAJOR}.*" --sort=-version:refname | grep -v '-' | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No non-prerelease tags found for major version ${PREV_MAJOR}. Cannot create LTS branch."
            exit 1
          fi

          echo "Creating LTS branch $LTS_BRANCH from tag $LATEST_TAG (last stable of previous major)"
          git checkout -b "$LTS_BRANCH" "$LATEST_TAG"
          git push -u origin "$LTS_BRANCH"
          echo "Created LTS branch: $LTS_BRANCH"

  stable-build:
    name: Build stable release
    runs-on: ubuntu-latest
    needs: [stable-merge]
    outputs:
      version: ${{ needs.stable-merge.outputs.version }}
      release-branch: ${{ needs.stable-merge.outputs.release-branch }}
      develop-merge-pr: ${{ needs.stable-merge.outputs.develop-merge-pr }}
      develop-merge-result: ${{ needs.stable-merge.outputs.develop-merge-result }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.stable-merge.outputs.release-branch }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean old package builds
        run: npm run all clean -- --e examples

      - name: Build all packages
        run: npm run all build -- --e examples visual-tests

      - name: Verify bundles
        run: node ./scripts/verify-bundles.mjs

      - name: Pack tarballs
        run: mkdir _tmp_packs && npm run all create-package -- --e examples --cmdArgs pack-destination="$(pwd)/_tmp_packs/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: npm_packs_${{ needs.stable-merge.outputs.version }}
          path: _tmp_packs/

      - name: Clean up tarballs
        run: rm -rf _tmp_packs

      - name: Publication summary
        run: |
          VERSION='${{ needs.stable-merge.outputs.version }}'
          RELEASE_BRANCH='${{ needs.stable-merge.outputs.release-branch }}'
          RELEASE_TAG='${{ github.event.release.tag_name }}'
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # ✅ Stable Release Publication Summary

          > The following stable release is ready to be published to npm.

          ## 📦 Package Details

          | Property | Value |
          |----------|-------|
          | **Version** | \`${VERSION}\` |
          | **Release Tag** | \`${RELEASE_TAG}\` |
          | **npm Tag** | \`latest\` |
          | **Branch** | \`${RELEASE_BRANCH}\` |

          ## ⏳ Awaiting Approval

          This job will proceed once approved by the \`approvers\` environment.
          Review the details above and approve the deployment to publish to npm.

          > This release will be published as \`latest\` and will be the default version installed by users.

          ---
          _Triggered by **${{ github.actor }}** on **${{ github.ref_name }}**_
          EOF

  # ============================================================
  # Scenario D.1 — NuGet build (parallel to stable-publish, isolated)
  # ============================================================
  stable-build-nuget:
    name: Build NuGet package
    runs-on: ubuntu-latest
    needs: [stable-build]
    outputs:
      version: ${{ needs.stable-build.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.stable-build.outputs.release-branch }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download npm build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.stable-build.outputs.version }}
          path: _tmp_packs/

      - name: Unpack handsontable tarball
        run: |
          mkdir -p handsontable/tmp
          tar -xzf _tmp_packs/handsontable-${{ needs.stable-build.outputs.version }}.tgz \
            -C handsontable/tmp --strip-components=1

      - name: Install nuget
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
          curl -o /tmp/nuget.exe https://dist.nuget.org/win-x86-commandline/v7.3.0/nuget.exe
          sudo bash -c 'echo "#!/bin/bash" > /usr/local/bin/nuget && echo "exec mono /tmp/nuget.exe \"\$@\"" >> /usr/local/bin/nuget && chmod +x /usr/local/bin/nuget'

      - name: Generate NuGet package
        run: node .github/scripts/generate-nuget-package.mjs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: nuget_pack_${{ needs.stable-build.outputs.version }}
          path: Handsontable.*.nupkg

      - name: Clean up NuGet package
        run: rm -f Handsontable.*.nupkg

  stable-publish:
    name: Publish stable release
    runs-on: ubuntu-latest
    needs: [stable-build]
    environment: approvers
    outputs:
      docs-result: ${{ steps.docs-result.outputs.result }}
    steps:
      - name: Checkout the release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.stable-build.outputs.release-branch }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: npm_packs_${{ needs.stable-build.outputs.version }}
          path: _tmp_packs/

      - name: Publish
        run: |
          npm install -g npm@${{ env.NPM_PUBLISH_VERSION }} # Ensure npm 11.5.1 or later for trusted publishing
          echo "Publishing packages from _tmp_packs/ with tag: latest"
          for TARBALL in _tmp_packs/*.tgz; do
            echo "Publishing: $(basename "$TARBALL")"
            npm publish "./$TARBALL" --tag latest
          done
          echo "All packages published successfully."

      - name: Unpack handsontable tarball for CDN purge
        continue-on-error: true
        run: |
          mkdir -p handsontable/tmp
          tar -xzf _tmp_packs/handsontable-${{ needs.stable-build.outputs.version }}.tgz \
            -C handsontable/tmp --strip-components=1

      - name: Purge jsDelivr CDN cache
        continue-on-error: true
        run: node .github/scripts/purge-jsdelivr-cache.mjs '${{ needs.stable-build.outputs.version }}'

      - name: Extract changelog for docs
        id: docs-changelog-content
        continue-on-error: true
        run: |
          VERSION='${{ needs.stable-build.outputs.version }}'
          CONTENT=$(node .github/scripts/extract-changelog.mjs "$VERSION")
          echo "content<<DOCS_CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "DOCS_CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Install dependencies
        id: docs-deps
        continue-on-error: true
        run: pnpm install --frozen-lockfile

      - name: Create or update docs production branch
        id: docs-branch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ needs.stable-build.outputs.version }}'
          # Strip patch version: "16.0.0" → "16.0"
          DOCS_BRANCH="${DOCS_BRANCH_PREFIX}${VERSION%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          if git ls-remote --heads origin "$DOCS_BRANCH" | grep -q "$DOCS_BRANCH"; then
            echo "Docs branch ${DOCS_BRANCH} already exists, checking out..."
            git checkout "$DOCS_BRANCH"
            git pull origin "$DOCS_BRANCH"
          else
            echo "Creating new docs branch ${DOCS_BRANCH} from tag ${VERSION}..."
            git checkout -b "$DOCS_BRANCH" "$VERSION"

            # Remove /content/api/ from docs/.gitignore so generated API docs can be committed
            BEFORE=$(wc -l < docs/.gitignore)
            grep -v '^/content/api/$' docs/.gitignore > docs/.gitignore.tmp && mv docs/.gitignore.tmp docs/.gitignore
            AFTER=$(wc -l < docs/.gitignore)

            if [ "$((BEFORE - 1))" != "$AFTER" ]; then
              echo "::error::docs/.gitignore modification produced unexpected result (before: ${BEFORE}, after: ${AFTER})"
              exit 1
            fi
          fi

      - name: Regenerate docs API and legacy versions
        id: docs-api
        continue-on-error: true
        run: |
          cd docs
          npm ci
          npm run docs:api
          npm run docs:scripts:generate-legacy-docs-versions

      - name: Update @handsontable/angular-wrapper version in docs
        id: docs-angular
        continue-on-error: true
        run: |
          VERSION='${{ needs.stable-build.outputs.version }}'
          BEFORE=$(wc -l < docs/package.json)

          node -e "
            import fs from 'fs';
            const pkg = JSON.parse(fs.readFileSync('docs/package.json', 'utf8'));
            pkg.devDependencies['@handsontable/angular-wrapper'] = '~${VERSION}';
            fs.writeFileSync('docs/package.json', JSON.stringify(pkg, null, 2) + '\n', 'utf8');
          "

          AFTER=$(wc -l < docs/package.json)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::docs/package.json modification changed line count (before: ${BEFORE}, after: ${AFTER})"
            exit 1
          fi

      - name: Update docs changelog
        id: docs-changelog
        continue-on-error: true
        env:
          CHANGELOG_CONTENT: ${{ steps.docs-changelog-content.outputs.content }}
        run: node .github/scripts/update-docs-changelog.mjs '${{ needs.stable-build.outputs.version }}'

      - name: Commit and push docs branch
        id: docs-commit
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ needs.stable-build.outputs.version }}'
          DOCS_BRANCH="${DOCS_BRANCH_PREFIX}${VERSION%.*}"

          git add .

          git commit -m "${VERSION}" || echo "No changes to commit"
          git push origin "$DOCS_BRANCH"

      - name: Set docs result output
        id: docs-result
        if: always()
        run: |
          if [ "${{ steps.docs-changelog-content.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-deps.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-branch.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-api.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-angular.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-changelog.outcome }}" = "failure" ] || \
             [ "${{ steps.docs-commit.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          elif [ "${{ steps.docs-changelog-content.outcome }}" = "success" ] && \
               [ "${{ steps.docs-deps.outcome }}" = "success" ] && \
               [ "${{ steps.docs-branch.outcome }}" = "success" ] && \
               [ "${{ steps.docs-api.outcome }}" = "success" ] && \
               [ "${{ steps.docs-angular.outcome }}" = "success" ] && \
               [ "${{ steps.docs-changelog.outcome }}" = "success" ] && \
               [ "${{ steps.docs-commit.outcome }}" = "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=skipped" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Scenario D.2 — NuGet publish (parallel to stable-publish, isolated)
  # ============================================================
  stable-publish-nuget:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    needs: [stable-build-nuget]
    environment: approvers
    steps:
      - name: Download NuGet package artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # https://github.com/actions/download-artifact/releases/tag/v8.0.0
        with:
          name: nuget_pack_${{ needs.stable-build-nuget.outputs.version }}

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # https://github.com/NuGet/login/releases/tag/v1.2.0
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        run: |
          NUPKG=$(ls *.nupkg)
          echo "Publishing: $NUPKG"
          dotnet nuget push "$NUPKG" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

  # ============================================================
  # Scenario D.2b — Delete release branch (only when all publish steps succeeded)
  # ============================================================
  stable-cleanup:
    name: Delete release branch
    runs-on: ubuntu-latest
    needs: [stable-build, stable-publish, stable-publish-nuget]
    if: always() && needs.stable-build.result == 'success' && needs.stable-publish.result == 'success' && needs.stable-publish-nuget.result == 'success' && needs.stable-publish.outputs.docs-result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0

      - name: Delete release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BRANCH='${{ needs.stable-build.outputs.release-branch }}'
          git push origin --delete "${RELEASE_BRANCH}"
          echo "Deleted release branch ${RELEASE_BRANCH}"

  # ============================================================
  # Scenario D.3 — Stable release notification
  # ============================================================
  stable-notify:
    name: Notify Slack — stable release
    runs-on: ubuntu-latest
    needs: [stable-build, stable-publish, stable-publish-nuget]
    if: ${{ !cancelled() && needs.stable-build.result == 'success' && (needs.stable-publish.result == 'success' || needs.stable-publish.result == 'failure') }}
    steps:
      - name: Prepare and send Slack message
        env:
          VERSION: ${{ needs.stable-build.outputs.version }}
          NPM_RESULT: ${{ needs.stable-publish.result }}
          NUGET_RESULT: ${{ needs.stable-publish-nuget.result }}
          DOCS_RESULT: ${{ needs.stable-publish.outputs.docs-result }}
          DEVELOP_MERGE_PR: ${{ needs.stable-build.outputs.develop-merge-pr }}
          DEVELOP_MERGE_RESULT: ${{ needs.stable-build.outputs.develop-merge-result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ "$NPM_RESULT" = "success" ]; then
            STATUS=":white_check_mark: Success"; NPM_STATUS=":white_check_mark: :npm: *npm*"; NPM_OK="true"
          else
            STATUS=":x: Failed"; NPM_STATUS=":x: :npm: *npm*"; NPM_OK="false"
          fi
          if [ "$NUGET_RESULT" = "success" ]; then NUGET_STATUS=":white_check_mark: :nuget: *NuGet*"; else NUGET_STATUS=":x: :nuget: *NuGet*"; fi
          if [ "$DOCS_RESULT" = "success" ]; then
            DOCS_STATUS=":arrows_counterclockwise: :chrome: *Docs*"
          elif [ "$DOCS_RESULT" = "skipped" ]; then
            DOCS_STATUS=":white_circle: :chrome: *Docs*"
          else
            DOCS_STATUS=":x: :chrome: *Docs*"
          fi
          if [ -n "$DEVELOP_MERGE_PR" ] || [ "$DEVELOP_MERGE_RESULT" = "failure" ]; then
            GITHUB_STATUS=":x: :github: *GitHub*"
          else
            GITHUB_STATUS=":white_check_mark: :github: *GitHub*"
          fi
          NL=$'\n'
          FAILURE_NOTES=""
          if [ "$NUGET_RESULT" != "success" ]; then
            FAILURE_NOTES="${FAILURE_NOTES}• *NuGet*: publish failed. The package was not uploaded to nuget.org. Re-run the \`stable-publish-nuget\` job to retry.${NL}"
          fi
          if [ "$DOCS_RESULT" = "failure" ]; then
            FAILURE_NOTES="${FAILURE_NOTES}• *Docs*: branch update failed. Manual intervention required — check the <${RUN_URL}|Actions run> and update the docs branch manually.${NL}"
          fi
          if [ -n "$DEVELOP_MERGE_PR" ]; then
            FAILURE_NOTES="${FAILURE_NOTES}• *GitHub*: merge to develop had conflicts. A <${DEVELOP_MERGE_PR}|PR was created> for manual resolution.${NL}"
          elif [ "$DEVELOP_MERGE_RESULT" = "failure" ]; then
            FAILURE_NOTES="${FAILURE_NOTES}• *GitHub*: merge to develop failed. Check the <${RUN_URL}|Actions run> and merge manually.${NL}"
          fi
          CHANGELOG_URL="${REPO_URL}/blob/master/CHANGELOG.md"

          jq -n \
            --arg version       "${VERSION}" \
            --arg status        "$STATUS" \
            --arg npm_status    "$NPM_STATUS" \
            --arg npm_ok        "$NPM_OK" \
            --arg nuget_status  "$NUGET_STATUS" \
            --arg docs_status   "$DOCS_STATUS" \
            --arg github_status "$GITHUB_STATUS" \
            --arg failure_notes "$FAILURE_NOTES" \
            --arg changelog_url "$CHANGELOG_URL" \
            --arg repo_url      "${REPO_URL}" \
            --arg run_url       "${RUN_URL}" \
          '{
            text: (if $npm_ok == "true" then "🚀 Version " + $version + " released!" else "❌ Release of version " + $version + " failed." end),
            blocks: [
              (if $npm_ok == "true" then
                { type: "header", text: { type: "plain_text", text: ("🚀 Version " + $version + " released!"), emoji: true } }
              else
                { type: "section", text: { type: "mrkdwn", text: (":x: *Release of version " + $version + " failed.* Check the <" + $run_url + "|GitHub Actions run> for details.") } }
              end),
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: ("*Status*\n" + $status) },
                  { type: "mrkdwn", text: "*Type*\n📦 Stable release" },
                  { type: "mrkdwn", text: ("*Version*\n<https://www.npmjs.com/package/handsontable/v/" + $version + "|" + $version + ">") },
                  { type: "mrkdwn", text: ("*Branch*\n<" + $repo_url + "/tree/master|master>") }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: $github_status },
                  { type: "mrkdwn", text: $npm_status },
                  { type: "mrkdwn", text: $nuget_status },
                  { type: "mrkdwn", text: $docs_status }
                ]
              },
              { type: "divider" },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ("*📋 Changelog*\n<" + $changelog_url + "|View CHANGELOG.md>" + if $npm_ok == "true" then "\n\n*🎮 Demos*\n• :javascript: <https://handsontable.com/codesandbox-vm?example-dir=javascript&handsontable-version=" + $version + "|JS>\n• :react: <https://handsontable.com/codesandbox-vm?example-dir=react&handsontable-version=" + $version + "|React>\n• :angular: <https://handsontable.com/codesandbox-vm?example-dir=angular&handsontable-version=" + $version + "|Angular>\n• :vue: <https://handsontable.com/codesandbox-vm?example-dir=vue&handsontable-version=" + $version + "|Vue>\n• :typescript: <https://handsontable.com/codesandbox-vm?example-dir=typescript&handsontable-version=" + $version + "|TypeScript>\n\n*📖 Docs*\n• :chrome: <https://handsontable.com/docs/javascript-data-grid/|View Docs>" else "" end)
                }
              },
              {
                type: "context",
                elements: [{ type: "mrkdwn", text: ("<" + $run_url + "|🔗 View GitHub Actions run>") }]
              },
              (if $failure_notes != "" then
                { type: "divider" },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("⚠️ *Non-critical failures*\n" + $failure_notes) }
                }
              else empty end)
            ]
          }' > /tmp/slack-payload.json
          echo "Slack payload:"
          cat /tmp/slack-payload.json

      - name: Notify Slack
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # https://github.com/slackapi/slack-github-action/releases/tag/v3.0.2
        with:
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
