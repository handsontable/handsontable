name: Docs Production Deployment

env:
  GHA_DOCKER_TAG: docker.pkg.github.com/${{ github.repository }}/handsontable-documentation

on:
  push:
    branches:
      - 'prod-docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./docs/

jobs:
  docker:
    name: Build and push Docker image
    if: ${{ github.ref != 'refs/heads/prod-docs/latest' }} # Exclude the prod-docs-latest branch from triggering the workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # https://github.com/actions/setup-node/releases/tag/v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8.0.0
        id: get-docs-version
        with:
          script: return context.ref.match(/^refs\/heads\/prod\-docs\/(\d+\.\d+)$/)[1] ?? '';
          result-encoding: string

      - name: Validate Docs version
        run: if [ -z "${{steps.get-docs-version.outputs.result}}" ]; then echo "Docs version is empty"; exit 1; fi

      - name: Docker login into GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login -u ${GITHUB_ACTOR} --password-stdin https://docker.pkg.github.com

      - name: Install monorepo dependencies and build packages
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          npm run all build -- --e examples visual-tests

      - name: Update module size measurements
        working-directory: .
        run: |
          npm run measure:module-sizes --prefix handsontable

      - name: Docker build
        run: |
          npm run docs:docker:build:production

      - name: Test plugins
        run: |
          npm run docs:test:plugins

      - name: Docker tags
        run: |
          docker tag docs-md:production $GHA_DOCKER_TAG":v${{steps.get-docs-version.outputs.result}}"
          docker tag docs-md:production $GHA_DOCKER_TAG":v${{steps.get-docs-version.outputs.result}}-${{ github.sha }}"

      - name: Docker push production into GHCR
        run: |
          docker push $GHA_DOCKER_TAG":v${{steps.get-docs-version.outputs.result}}"

      - name: Docker push SHA tagged into GHCR
        run: |
          docker push $GHA_DOCKER_TAG":v${{steps.get-docs-version.outputs.result}}-${{ github.sha }}"

      - name: Build and deploy the production to Netlify (from Docker images)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd netlify
          mkdir -p docs/docs
          ./build_current_version.sh

      - name: Publish production to Netlify
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # https://github.com/nick-fields/retry/releases/tag/v3.0.2
        with:
          timeout_seconds: 1600
          max_attempts: 3
          retry_on: error
          command: |
            cd docs
            cd netlify
            npm install netlify-cli -g
            netlify deploy --prod --build --context production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PREVIEW_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}

      # Cloudflare Pages deploy is independent of Netlify: !cancelled() lets
      # these steps run even when the Netlify publish above fails, so the apex
      # handsontable-docs.pages.dev still updates.
      #
      # Cloudflare ignores _redirects when _worker.js is present, so the worker
      # carries ALL redirect logic. The worker MUST always be written to the
      # publish dir: if it is missing, Pages silently falls back to _redirects
      # and every worker-only redirect (version roots like /docs/14.1, /docs/next,
      # framework routing, hyperformula) breaks site-wide.
      #
      # The worker's __LATEST_DOCS_VERSION__ placeholder (rule 1b) is substituted
      # with the latest released MAJOR.MINOR version, read from
      # netlify/LATEST_DOCS_VERSION - written by build_current_version.sh from
      # the same getListOrPreviousVersions.mjs (GraphQL) source that decides
      # the content layout (latest version's docs at the unversioned /docs
      # root; older versions under /docs/<version>/).
      #
      # This must be the LATEST version, not the version being deployed
      # (steps.get-docs-version, i.e. the prod-docs/<MAJOR.MINOR> branch name):
      # those differ whenever a hotfix is pushed to an older prod-docs branch.
      # Injecting the branch name there would make rule 1b redirect that
      # older version's URLs to the unversioned root (301, browser-cached) -
      # serving the wrong version's content - and make /docs/<latest> 404,
      # since no /docs/<latest>/ directory exists in the publish dir.
      #
      # An earlier version of this step fetched the version from the GitHub
      # API directly; a transient API failure ("Premature close") aborted the
      # step under `bash -e` before the worker was copied, so the deploy
      # shipped without a worker and took down all docs redirects (DEV-1969).
      # Reading the file written by the build step has no network dependency
      # of its own, and version substitution is still best-effort - it can
      # never block the worker copy.
      - name: Add Cloudflare worker to production deploy
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          cd netlify
          LATEST_VERSION="$(cat LATEST_DOCS_VERSION 2>/dev/null || true)"
          if printf '%s' "${LATEST_VERSION:-}" | grep -Eq '^[0-9]+\.[0-9]+$'; then
            echo "Injecting LATEST_VERSION=$LATEST_VERSION into Cloudflare worker."
            sed "s/__LATEST_DOCS_VERSION__/${LATEST_VERSION}/g" ../cloudflare/_worker.js > docs/_worker.js
          else
            echo "WARNING: no valid LATEST_DOCS_VERSION from the build - deploying worker verbatim; rule 1b no-ops." >&2
            cp ../cloudflare/_worker.js docs/_worker.js
          fi
          # Tripwire: the worker must exist in the publish dir, otherwise Pages
          # falls back to _redirects and all worker redirects break.
          test -f docs/_worker.js

      - name: Ensure Cloudflare Pages production project exists
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: node cloudflare/ensureProject.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: handsontable-docs
          # "production" is a stable Cloudflare Pages branch label, NOT a git
          # branch (the real prod git branch is e.g. prod-docs/18.0). The deploy
          # below passes the same label to --branch, so the deployment is served
          # at the apex handsontable-docs.pages.dev. Using the per-version git
          # branch here would move the apex on every release.
          CF_PAGES_APEX_BRANCH: production

      - name: Deploy production to Cloudflare Pages
        if: ${{ !cancelled() }}
        continue-on-error: true
        # Install wrangler in /tmp to avoid npm failures inside the pnpm workspace
        working-directory: /tmp
        run: |
          npm install wrangler
          ./node_modules/.bin/wrangler pages deploy \
            "$GITHUB_WORKSPACE/docs/netlify/docs" \
            --project-name handsontable-docs \
            --branch production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Algolia crawler start
        env:
          crawler-name: Github Crawler
          crawler-id: 8062e3d3-ea11-422a-a31a-3b8003bef6f6
          crawler-user-id: 61f462d3-fa0d-465f-8fc1-e39231615539
          crawler-api-key: ${{ secrets.CRAWLER_API_KEY }}
          site-url: 'https://handsontable.com'
        run: |
          wget --method POST \
            --auth-no-challenge \
            --user='${{ env.crawler-user-id }}' \
            --password='${{ env.crawler-api-key}}'  \
            'https://crawler.algolia.com/api/1/crawlers/${{ env.crawler-id }}/reindex'
