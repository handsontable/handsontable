name: Preview packages (pkg.pr.new)

# NOTE: The pkg.pr.new GitHub App must be installed on this repository
# for the publish step to post a PR comment with install links.
# Install at: https://github.com/apps/pkg-pr-new

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  publish-preview:
    name: Build and publish preview packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        name: Install pnpm

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: npm run all build -- --e examples visual-tests

      - name: Publish preview packages
        run: |
          npx pkg-pr-new publish \
            --template ./examples/prs/js \
            --template ./examples/prs/ts \
            --template ./examples/prs/react \
            ./handsontable/tmp \
            './wrappers/angular-wrapper/dist/hot-table' \
            ./wrappers/react-wrapper \
            ./wrappers/vue3
