# H2 in-memory datasource -- zero setup, data lives only while the app is running.
spring.datasource.url=jdbc:h2:mem:products;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use the H2 dialect so Hibernate generates compatible SQL.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Drop and recreate the schema on every startup -- fine for a recipe, not for production.
spring.jpa.hibernate.ddl-auto=create-drop

# Enable the H2 web console at /h2-console for debugging.
spring.h2.console.enabled=true
